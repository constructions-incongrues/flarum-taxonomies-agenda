name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  composer-validate:
    name: Validate composer.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Validate composer.json
        working-directory: extension/taxonomies-agenda
        run: composer validate --strict

  php-tests:
    name: PHP ${{ matrix.php }} - Tests
    runs-on: ubuntu-latest
    needs: composer-validate
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov
          tools: composer:v2
          extensions: dom, curl, libxml, mbstring, zip, pdo, mysql, sqlite, pgsql, bcmath, soap, intl, gd, exif, iconv, imagick

      - name: Get Composer Cache Directory
        id: composer-cache
        working-directory: extension/taxonomies-agenda
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        working-directory: extension/taxonomies-agenda
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPUnit tests
        working-directory: extension/taxonomies-agenda
        run: ./vendor/bin/phpunit --testsuite unit --coverage-clover=coverage.xml

      - name: Upload coverage reports
        if: success()
        uses: codecov/codecov-action@v3
        with:
          files: extension/taxonomies-agenda/coverage.xml
          flags: php-${{ matrix.php }}
          fail_ci_if_error: false

  js-build:
    name: JS build & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get npm cache directory
        id: npm-cache
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT

      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.npm-cache.outputs.dir }}
          key: ${{ runner.os }}-npm-${{ hashFiles('extension/taxonomies-agenda/js/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install JS dependencies
        working-directory: extension/taxonomies-agenda/js
        run: npm ci --audit=false --fund=false

      - name: Verify source files exist
        working-directory: extension/taxonomies-agenda/js
        run: |
          test -f forum.js || { echo "ERROR: forum.js missing"; exit 1; }
          test -f admin.js || { echo "ERROR: admin.js missing"; exit 1; }
          test -d src/forum || { echo "ERROR: src/forum missing"; exit 1; }
          test -d src/admin || { echo "ERROR: src/admin missing"; exit 1; }
          echo "✓ Entry points and sources exist"

      - name: Lint JavaScript
        working-directory: extension/taxonomies-agenda/js
        run: npm run lint --if-present || true

      - name: Build bundle
        working-directory: extension/taxonomies-agenda/js
        run: |
          echo "Building with webpack..."
          npm run build
          echo "✓ Webpack build completed"
          
          # Debug: Show dist directory contents
          echo ""
          echo "=== Debug: dist directory after build ==="
          ls -lah dist/ || echo "dist directory not found!"

      - name: Check webpack artifacts
        run: |
          echo "Checking artifacts..."
          test -d extension/taxonomies-agenda/js/dist || { echo "dist dir missing"; exit 1; }
          test -f extension/taxonomies-agenda/js/dist/forum.js || { echo "forum.js missing"; exit 1; }
          test -s extension/taxonomies-agenda/js/dist/forum.js || { echo "forum.js empty"; exit 1; }
          test -f extension/taxonomies-agenda/js/dist/admin.js || { echo "admin.js missing"; exit 1; }
          test -s extension/taxonomies-agenda/js/dist/admin.js || { echo "admin.js empty"; exit 1; }
          echo "✅ All artifacts valid"
