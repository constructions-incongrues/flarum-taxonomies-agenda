name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  php-tests:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPUnit
        run: composer test

  js-build:
    name: JS build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dependencies
        working-directory: js
        run: npm install --no-audit --no-fund

      - name: Build bundle
        working-directory: js
        run: npm run build

      - name: Verify bundle
        run: |
          test -s js/dist/forum.js || { echo "js/dist/forum.js missing or empty"; exit 1; }
          echo "Bundle size: $(wc -c < js/dist/forum.js) bytes"
